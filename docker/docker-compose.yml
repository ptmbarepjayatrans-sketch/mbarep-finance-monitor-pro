version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mbarep-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: mbarep_finance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mbarep-network

  redis:
    image: redis:7-alpine
    container_name: mbarep-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mbarep-network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mbarep-app
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/mbarep_finance
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mbarep-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  mbarep-network:
    driver: bridge